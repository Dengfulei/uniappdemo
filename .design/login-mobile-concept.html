<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Mobile Concept</title>
    <style>
      :root {
        --ink: #172623;
        --pine: #213a34;
        --moss: #7f955f;
        --paper: #fff8ed;
        --linen: #f2e4cf;
        --clay: #c45f3d;
        --gold: #e4b762;
        --muted: #776b5d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 28% 12%, rgba(228, 183, 98, 0.32), transparent 28%),
          radial-gradient(circle at 78% 72%, rgba(127, 149, 95, 0.26), transparent 30%),
          #e7d8c2;
        color: var(--ink);
        font-family: ui-rounded, "SF Pro Rounded", "PingFang SC", "Hiragino Sans GB", sans-serif;
      }

      .phone {
        width: 390px;
        height: 844px;
        padding: 12px;
        border-radius: 46px;
        background: #111b19;
        box-shadow: 0 28px 70px rgba(25, 20, 16, 0.38);
      }

      .screen {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 36px;
        background:
          linear-gradient(150deg, rgba(255, 248, 237, 0.95) 0%, rgba(242, 228, 207, 0.98) 50%, rgba(236, 218, 190, 1) 100%);
      }

      .status {
        height: 44px;
        padding: 15px 24px 0;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        font-size: 13px;
        font-weight: 800;
      }

      .signal {
        display: flex;
        gap: 5px;
        align-items: center;
      }

      .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--ink);
      }

      .hero {
        position: relative;
        padding: 20px 24px 0;
      }

      .mark-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .mark {
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        border-radius: 20px;
        background: var(--pine);
        color: var(--gold);
        font-size: 30px;
        font-weight: 900;
        box-shadow: 0 12px 24px rgba(33, 58, 52, 0.24);
      }

      .mode-pill {
        height: 34px;
        padding: 0 14px;
        display: flex;
        align-items: center;
        gap: 7px;
        border-radius: 17px;
        background: rgba(255, 248, 237, 0.72);
        color: var(--pine);
        font-size: 12px;
        font-weight: 800;
        box-shadow: inset 0 0 0 1px rgba(33, 58, 52, 0.08);
      }

      .leaf {
        width: 8px;
        height: 14px;
        border-radius: 8px 8px 8px 0;
        background: var(--moss);
        transform: rotate(24deg);
      }

      .kicker {
        margin-top: 34px;
        color: var(--clay);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.12em;
      }

      h1 {
        margin: 9px 0 0;
        color: var(--ink);
        font-size: 42px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .subcopy {
        width: 260px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
      }

      .market-strip {
        position: relative;
        height: 126px;
        margin-top: 26px;
      }

      .produce-card {
        position: absolute;
        top: 0;
        width: 116px;
        height: 116px;
        border-radius: 30px;
        background: var(--paper);
        box-shadow: 0 16px 34px rgba(49, 37, 24, 0.13);
      }

      .produce-card.one {
        left: 0;
        transform: rotate(-8deg);
        background:
          radial-gradient(circle at 50% 44%, #df8b61 0 18px, transparent 19px),
          radial-gradient(circle at 36% 58%, #9dbb77 0 13px, transparent 14px),
          radial-gradient(circle at 62% 64%, #f0c565 0 12px, transparent 13px),
          var(--paper);
      }

      .produce-card.two {
        left: 106px;
        top: 10px;
        transform: rotate(4deg);
        background:
          radial-gradient(circle at 49% 44%, #6f8f84 0 22px, transparent 23px),
          radial-gradient(circle at 40% 66%, #d6a96b 0 12px, transparent 13px),
          radial-gradient(circle at 67% 64%, #2e524b 0 9px, transparent 10px),
          #fff4df;
      }

      .produce-card.three {
        right: -18px;
        top: -8px;
        transform: rotate(10deg);
        background:
          radial-gradient(circle at 45% 46%, #c45f3d 0 17px, transparent 18px),
          radial-gradient(circle at 58% 61%, #e4b762 0 16px, transparent 17px),
          radial-gradient(circle at 38% 67%, #7f955f 0 11px, transparent 12px),
          #fff8ed;
      }

      .sheet {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px 22px 24px;
        border-radius: 34px 34px 0 0;
        background: rgba(255, 250, 241, 0.96);
        box-shadow: 0 -18px 42px rgba(54, 40, 24, 0.18);
      }

      .handle {
        width: 48px;
        height: 5px;
        margin: 0 auto 18px;
        border-radius: 999px;
        background: #d7c5aa;
      }

      .demo-bar {
        min-height: 62px;
        padding: 12px 12px 12px 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-radius: 22px;
        background: var(--pine);
        color: var(--paper);
      }

      .demo-title {
        display: block;
        font-size: 14px;
        font-weight: 900;
      }

      .demo-value {
        display: block;
        margin-top: 4px;
        color: #c9d8d1;
        font-size: 12px;
      }

      .fill {
        width: 48px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 17px;
        background: var(--gold);
        color: var(--ink);
        font-size: 13px;
        font-weight: 900;
      }

      .fields {
        margin-top: 18px;
        display: grid;
        gap: 12px;
      }

      .field {
        height: 58px;
        padding: 0 15px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-radius: 21px;
        background: var(--linen);
      }

      .icon {
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #e3c99d;
        color: var(--pine);
        font-size: 15px;
        font-weight: 900;
      }

      .input-copy {
        display: grid;
        gap: 2px;
      }

      .label {
        color: #756857;
        font-size: 11px;
        font-weight: 800;
      }

      .value {
        color: var(--ink);
        font-size: 16px;
        font-weight: 800;
      }

      .meta {
        margin: 13px 3px 18px;
        display: flex;
        justify-content: space-between;
        color: #8a7d6c;
        font-size: 12px;
        font-weight: 700;
      }

      .meta strong {
        color: var(--clay);
      }

      .cta {
        height: 58px;
        display: grid;
        place-items: center;
        border-radius: 29px;
        background: var(--clay);
        color: var(--paper);
        font-size: 17px;
        font-weight: 900;
        box-shadow: 0 14px 24px rgba(196, 95, 61, 0.26);
      }

      .home-indicator {
        width: 124px;
        height: 5px;
        margin: 16px auto 0;
        border-radius: 999px;
        background: #1c2523;
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="移动端登录页设计稿">
      <section class="screen">
        <div class="status">
          <span>9:41</span>
          <span class="signal"><i class="dot"></i><i class="dot"></i><i class="dot"></i></span>
        </div>

        <section class="hero">
          <div class="mark-row">
            <div class="mark">M</div>
            <div class="mode-pill"><span class="leaf"></span>演示账号</div>
          </div>
          <div class="kicker">SPRING MARKET</div>
          <h1>欢迎回来</h1>
          <p class="subcopy">登录后继续浏览精选商品、原生能力与移动端购物体验。</p>
          <div class="market-strip" aria-hidden="true">
            <div class="produce-card one"></div>
            <div class="produce-card two"></div>
            <div class="produce-card three"></div>
          </div>
        </section>

        <section class="sheet">
          <div class="handle"></div>
          <div class="demo-bar">
            <span>
              <span class="demo-title">测试帐号</span>
              <span class="demo-value">admin / 123456</span>
            </span>
            <span class="fill">填入</span>
          </div>

          <div class="fields">
            <div class="field">
              <span class="icon">人</span>
              <span class="input-copy">
                <span class="label">帐号</span>
                <span class="value">admin</span>
              </span>
            </div>
            <div class="field">
              <span class="icon">锁</span>
              <span class="input-copy">
                <span class="label">密码</span>
                <span class="value">••••••</span>
              </span>
            </div>
          </div>

          <div class="meta">
            <span>本地校验</span>
            <strong>安全演示模式</strong>
          </div>
          <div class="cta">立即登录</div>
          <div class="home-indicator"></div>
        </section>
      </section>
    </main>
  </body>
</html>
